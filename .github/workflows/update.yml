name: Update LibreWolf Cask

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get latest version from Codeberg
        id: version
        run: |
          RAW=$(curl -s "https://codeberg.org/api/v1/repos/librewolf/bsys6/releases?limit=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['tag_name'].lstrip('v'))")
          VERSION=$(python3 -c "print('$RAW'.replace('-', ',', 1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_dash=$RAW" >> $GITHUB_OUTPUT

      - name: Check if already up to date
        id: check
        run: |
          CURRENT=$(python3 -c "
          import re
          content = open('Casks/librewolf.rb').read()
          m = re.search(r'version \"(.+?)\"', content)
          print(m.group(1) if m else '')
          ")
          NEW="${{ steps.version.outputs.version }}"
          if [ "$CURRENT" = "$NEW" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute SHA256 of ARM64 DMG
        if: steps.check.outputs.skip == 'false'
        id: hash_arm
        run: |
          V="${{ steps.version.outputs.version_dash }}"
          URL="https://codeberg.org/api/packages/librewolf/generic/librewolf/${V}/librewolf-${V}-macos-arm64-package.dmg"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Compute SHA256 of Intel DMG
        if: steps.check.outputs.skip == 'false'
        id: hash_intel
        run: |
          V="${{ steps.version.outputs.version_dash }}"
          URL="https://codeberg.org/api/packages/librewolf/generic/librewolf/${V}/librewolf-${V}-macos-x86_64-package.dmg"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Update cask file
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 -c "
          import re, os
          content = open('Casks/librewolf.rb').read()
          content = re.sub(r'version \".*?\"', 'version \"' + os.environ['VERSION'] + '\"', content)
          content = re.sub(
            r'sha256 arm:.*?intel:.*?\".*?\"',
            'sha256 arm:   \"' + os.environ['SHA_ARM'] + '\",\n         intel: \"' + os.environ['SHA_INTEL'] + '\"',
            content, flags=re.DOTALL
          )
          open('Casks/librewolf.rb', 'w').write(content)
          "
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_ARM: ${{ steps.hash_arm.outputs.sha }}
          SHA_INTEL: ${{ steps.hash_intel.outputs.sha }}

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/librewolf.rb
          git commit -m "Update LibreWolf to ${{ steps.version.outputs.version }}"
          git push
